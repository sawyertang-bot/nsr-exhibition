        <option>报名费</option><option>会刊费</option><option>增租费</option><option>随团费用</option><option>其他费用</option>
      </select>
    </div>
    <div class="table-container" id="payments-table">
      ${renderPaymentTable(payments, companies, projects)}
    </div>
  </div>`;
  return html;
}

function renderPaymentTable(payments, companies, projects) {
  const validPayments = payments.filter(p => p.validityStatus !== '已作废');
  const total = validPayments.reduce((s, p) => s + (Number(p.amount) || 0), 0);
  
  let html = '';
  if (validPayments.length === 0) {
    html += '<p class="text-muted text-center p-4">暂无付款记录</p>';
  } else {
    html += `<table class="data-table">
      <thead><tr>
        <th>日期</th><th>企业</th><th>项目</th><th>类型</th><th>用途</th>
        <th>金额</th><th>核对</th><th>备注</th><th>操作</th>
      </tr></thead>
      <tbody>`;
    validPayments.forEach(p => {
      const company = companies.find(c => String(c.id) === String(p.companyId));
      const project = projects.find(pr => String(pr.id) === String(p.projectId));
      html += `<tr>
        <td>${fmtDate(p.paidAt)}</td>
        <td>${esc(company ? company.companyCn : '')}</td>
        <td>${esc(project ? project.name : '')}</td>
        <td>${esc(p.category)}</td>
        <td>${esc(p.purpose || '')}</td>
        <td class="amount">¥${fmt(p.amount)}</td>
        <td><span class="badge badge-${p.verificationStatus === '已核对' ? 'success' : 'warning'}">${esc(p.verificationStatus)}</span></td>
        <td>${esc(p.notes || '')}</td>
        <td class="actions">
          <button class="btn btn-xs" onclick="editPayment('${p.id}')">编辑</button>
          <button class="btn btn-xs btn-danger" onclick="voidPayment('${p.id}')">作废</button>
        </td>
      </tr>`;
    });
    html += `</tbody><tfoot><tr><td colspan="5" class="text-right"><strong>合计</strong></td><td class="amount"><strong>¥${fmt(total)}</strong></td><td colspan="3"></td></tr></tfoot></table>`;
  }
  return html;
}

async function filterPayments() {
  const projectId = document.getElementById('filter-payment-project')?.value || '';
  const status = document.getElementById('filter-payment-status')?.value || '';
  const category = document.getElementById('filter-payment-category')?.value || '';
  
  let payments = await getAll('paymentRecords');
  if (projectId) payments = payments.filter(p => String(p.projectId) === projectId);
  if (status) payments = payments.filter(p => p.verificationStatus === status);
  if (category) payments = payments.filter(p => p.category === category);
  
  const companies = await getAll('companies');
  const projects = await getAll('projects');
  
  const container = document.getElementById('payments-table');
  if (container) container.innerHTML = renderPaymentTable(payments, companies, projects);
}

async function editPayment(paymentId) {
  const payment = await getById('paymentRecords', paymentId);
  if (!payment) { showToast('付款记录不存在', 'error'); return; }
  
  showModal('编辑付款记录', `
    <div class="form-grid">
      <div class="form-group"><label>付款日期</label><input id="f-paidAt" class="form-input" type="date" value="${fmtDate(payment.paidAt)}" /></div>
      <div class="form-group"><label>金额</label><input id="f-amount" class="form-input" type="number" step="0.01" value="${payment.amount}" /></div>
      <div class="form-group"><label>类型</label>
        <select id="f-category" class="form-input">
          ${['意向定金','展位费','展位费首款','展位费中期款','展位费尾款','报名费','会刊费','增租费','随团费用','其他费用'].map(c => `<option value="${c}" ${payment.category===c?'selected':''}>${c}</option>`).join('')}
        </select></div>
      <div class="form-group"><label>用途</label><input id="f-purpose" class="form-input" value="${esc(payment.purpose)}" /></div>
      <div class="form-group"><label>核对状态</label>
        <select id="f-verificationStatus" class="form-input">
          <option ${payment.verificationStatus==='待核对'?'selected':''}>待核对</option>
          <option ${payment.verificationStatus==='已核对'?'selected':''}>已核对</option>
        </select></div>
      <div class="form-group full-width"><label>备注</label><textarea id="f-notes" class="form-input" rows="2">${esc(payment.notes)}</textarea></div>
    </div>
  `, async (overlay) => {
    payment.paidAt = overlay.querySelector('#f-paidAt').value;
    payment.amount = parseFloat(overlay.querySelector('#f-amount').value) || 0;
    payment.category = overlay.querySelector('#f-category').value;
    payment.purpose = overlay.querySelector('#f-purpose').value.trim();
    payment.verificationStatus = overlay.querySelector('#f-verificationStatus').value;
    payment.notes = overlay.querySelector('#f-notes').value.trim();
    payment.updatedAt = now();
    await put('paymentRecords', payment);
    
    // 同步更新 member 付款状态
    const memberPayments = await getByIndex('paymentRecords', 'companyId', String(payment.companyId));
    const projPayments = memberPayments.filter(p => String(p.projectId) === String(payment.projectId) && p.validityStatus !== '已作废');
    const totalPaid = projPayments.reduce((sum, p) => sum + (Number(p.amount) || 0), 0);
    const members = await getByIndex('projectMembers', 'companyId', String(payment.companyId));
    const member = members.find(m => String(m.projectId) === String(payment.projectId));
    if (member) {
      const contractAmount = Number(member.contractAmount) || 0;
      if (totalPaid <= 0) member.paymentStatus = '未收款';
      else if (totalPaid < contractAmount) member.paymentStatus = '部分收款';
      else if (Math.abs(totalPaid - contractAmount) < 0.01) member.paymentStatus = '已收全款';
      else member.paymentStatus = '多收款';
      member.updatedAt = now();
      await put('projectMembers', member);
    }
    
    showToast('付款记录已更新', 'success');
  });
}

async function voidPayment(paymentId) {
  const payment = await getById('paymentRecords', paymentId);
  if (!payment) { showToast('付款记录不存在', 'error'); return; }
  
  if (!confirm(`确定要作废这笔付款吗？\n\n金额: ¥${fmt(payment.amount)}\n日期: ${fmtDate(payment.paidAt)}\n\n作废后该记录将保留但标记为无效。`)) return;
  
  payment.validityStatus = '已作废';
  payment.updatedAt = now();
  await put('paymentRecords', payment);
  
  // 同步更新 member 付款状态
  const memberPayments = await getByIndex('paymentRecords', 'companyId', String(payment.companyId));
  const projPayments = memberPayments.filter(p => String(p.projectId) === String(payment.projectId) && p.validityStatus !== '已作废');
  const totalPaid = projPayments.reduce((sum, p) => sum + (Number(p.amount) || 0), 0);
  const members = await getByIndex('projectMembers', 'companyId', String(payment.companyId));
  const member = members.find(m => String(m.projectId) === String(payment.projectId));
  if (member) {
    const contractAmount = Number(member.contractAmount) || 0;
    if (totalPaid <= 0) member.paymentStatus = '未收款';
    else if (totalPaid < contractAmount) member.paymentStatus = '部分收款';
    else if (Math.abs(totalPaid - contractAmount) < 0.01) member.paymentStatus = '已收全款';
    else member.paymentStatus = '多收款';
    member.updatedAt = now();
    await put('projectMembers', member);
  }
  
  showToast('付款记录已作废', 'warning');
  navigateTo('payments');
}

</script>

async function renderSubsidy() {

  const subsidyMembers = members.filter(m => m.subsidyEnabled);

    const p = projects.find(pr => String(pr.id) === String(m.projectId));

    const completedItems = Object.values(materials).filter(v => v.status === '已通过' || v.status === '不适用').length;

    html += `<tr>

  }
  
  html += '</tbody></table></div></div>';

async function exportBackup() {
  try {
    const data = await exportAllData();
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `新丝路会展平台_备份_${new Date().toISOString().split('T')[0]}_${new Date().toTimeString().split(' ')[0].replace(/:/g,'')}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('备份导出成功！', 'success');
  } catch(e) {
    showToast('备份导出失败: ' + e.message, 'error');
  }
}

async function exportCompaniesCSV() {
  const companies = await getAll('companies');
  const headers = ['id','companyCn','company','contactName','phone','email','website','province','city','stage','priority','owner','contactSource','notes'];
  const rows = companies.map(c => headers.map(h => `"${String(c[h]||'').replace(/"/g,'""')}"`).join(','));
  const csv = ['\uFEFF' + headers.join(','), ...rows].join('\n');
  
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `企业库_${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('企业库导出成功', 'success');
}

async function importBackup() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    
    if (!confirm('⚠️ 恢复操作将覆盖当前所有数据！\n\n请确认已备份当前数据。\n\n此操作不可撤销，确定要恢复吗？')) return;
    
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      await importAllData(data, true);
      showToast('数据恢复成功！页面将重新加载。', 'success');
      setTimeout(() => location.reload(), 1500);
    } catch(err) {
      showToast('数据恢复失败: ' + err.message, 'error');
    }
  };
  input.click();
}

async function handleFileImport(event) {
  const files = event.target.files;
  if (!files || files.length === 0) return;
  
  const log = document.getElementById('import-log');
  log.innerHTML = `<p>正在读取 ${files.length} 个文件...</p>`;
  
  try {
    const results = await importFromFiles(files);
    log.innerHTML = '<h4>导入结果:</h4>' + results.map(r => `<p>${r}</p>`).join('');
    log.innerHTML += '<p style="color:green;font-weight:bold">✅ 数据导入完成！页面即将刷新...</p>';

  } catch(e) {

async function tryServerImport() {

function checkAutoBackup() {
  const lastBackup = localStorage.getItem('nsr_last_backup');
  const now = new Date().getTime();
  if (!lastBackup || (now - parseInt(lastBackup)) > 7 * 24 * 60 * 60 * 1000) {
    setTimeout(() => {
      showToast('💡 距上次备份已超过7天，建议前往"数据备份"中心导出备份', 'info');
    }, 3000);
  }
}

// ============ 工具函数 ============
function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmt(num, decimals = 2) {
  if (num === undefined || num === null || num === '') return '0.00';
  const n = Number(num);
  if (isNaN(n)) return String(num);
  return n.toLocaleString('zh-CN', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
}

function fmtInt(num) {
  if (num === undefined || num === null || num === '') return '0';
  const n = Number(num);
  if (isNaN(n)) return String(num);
  return Math.round(n).toLocaleString('zh-CN');
}

function fmtDate(dateStr) {
  if (!dateStr) return '';
  try {
    const d = new Date(dateStr);
    if (isNaN(d.getTime())) return dateStr;
    return d.toISOString().split('T')[0];
  } catch(e) { return dateStr; }
}

function now() { return new Date().toISOString(); }
function generateId() { return String(Date.now()) + Math.random().toString(36).substr(2, 6); }

async function generateContractNumber(projectId) {
  const project = await getById('projects', projectId);
  if (!project) return '';
  const year = project.year || new Date().getFullYear();
  const abbr = project.englishName ? project.englishName.replace(/[^A-Z]/g, '').substring(0, 6) : 'PROJ';
  if (!abbr || abbr.length < 2) { throw new Error('请先在项目设置中填写英文名称缩写'); }
  const contracts = await getAll('contracts');
  const existing = contracts.filter(c => c.projectId === projectId && c.contractNumber);
  const maxSeq = existing.reduce((max, c) => {
    const parts = c.contractNumber.split('-');
    const seq = parseInt(parts[parts.length - 1]) || 0;
    return Math.max(max, seq);
  }, 0);
  const seq = String(maxSeq + 1).padStart(3, '0');
  return `NSR-${year}-${abbr}-${seq}`;
}

function amountToChinese(num) {
  if (!num || num === 0) return '零元整';
  const units = ['', '拾', '佰', '仟', '万', '拾', '佰', '仟', '亿'];
  const digits = ['零', '壹', '贰', '叁', '肆', '伍', '陆', '柒', '捌', '玖'];
  let n = Math.abs(Math.round(Number(num) * 100));
  if (n === 0) return '零元整';
  let yuan = Math.floor(n / 100), jiao = Math.floor((n % 100) / 10), fen = n % 10;
  function convertYuan(num) {
    if (num === 0) return '零';
    let s = '', i = 0, prevZero = false;
    while (num > 0) {
      let d = num % 10;
      if (d === 0) { if (!prevZero && s !== '') prevZero = true; }
      else { if (prevZero) { s = '零' + s; prevZero = false; } s = digits[d] + units[i] + s; }
      num = Math.floor(num / 10); i++;
    }
    return s.replace(/零$/, '');
  }
  let result = convertYuan(yuan) + '元';
  if (jiao > 0) result += digits[jiao] + '角';
  if (fen > 0) result += digits[fen] + '分';
  else if (jiao === 0) result += '整';
  return result;
}

      <div class="detail-item"><label>意向面积</label><span>${member.intendedArea || '-'} ㎡</span></div>
      <div class="detail-item"><label>业务归属</label><span>${esc(member.businessOwner || member.owner)}</span></div>
      <div class="detail-item"><label>合同状态</label><span><span class="badge badge-${getContractStatusClass(member.contractStatus)}">${esc(member.contractStatus||'未签订')}</span></span></div>
      <div class="detail-item"><label>付款状态</label><span><span class="badge badge-${getPaymentStatusClass(member.paymentStatus)}">${esc(member.paymentStatus||'未收款')}</span></span></div>
      <div class="detail-item"><label>展位类型</label><span>${esc(member.boothType || '-')}</span></div>
      <div class="detail-item"><label>是否跟团</label><span>${member.isGroupTour ? '✅' : '❌'}</span></div>
      <div class="detail-item"><label>是否申请补贴</label><span>${member.subsidyEnabled ? '✅' : '❌'}</span></div>
    </div>
    
    <h4 style="font-size:13px;font-weight:600;margin:16px 0 12px">📝 跟进记录 (${(member.followUps || []).length})</h4>
    <div class="timeline">${(member.followUps || []).map(f => `
      <div class="timeline-item">
        <div class="timeline-date">${fmtDate(f.date)}</div>
        <div class="timeline-content">
          <div class="timeline-meta">${esc(f.method || '')} | ${esc(f.person || '')}</div>
          <p>${esc(f.content)}</p>
          ${f.nextDate ? `<small>下次跟进: ${fmtDate(f.nextDate)}</small>` : ''}
        </div>
      </div>
    `).join('')}${(member.followUps || []).length === 0 ? '<p class="text-muted">暂无跟进记录</p>' : ''}</div>`;
  }
  
  html += '</div></div>';
  document.getElementById('content-area').innerHTML = html;
}

function getContractStatusClass(status) {
  switch(status) { case '已签订': case '履行中': case '已完成': return 'success'; case '已发送': case '待回签': return 'info'; case '草稿': case '待确认': return 'warning'; case '已取消': case '已作废': return 'danger'; default: return 'default'; }
}
function getPaymentStatusClass(status) {
  switch(status) { case '已收全款': return 'success'; case '部分收款': return 'info'; case '未收款': return 'default'; case '多收款': return 'warning'; case '已退款': return 'danger'; default: return 'default'; }
}

</script>

<script>
// 初始化
document.addEventListener('DOMContentLoaded', () => {
  initApp();
});
</script>
</body>
</html>
